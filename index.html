        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #000000;
            font-family: 'Trebuchet MS', sans-serif;
        }
        #top-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 70px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgb(0, 255, 0);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px 20px;
            box-sizing: border-box;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0, 255, 0, 0.2);
        }

        #patec-status {
            color: rgb(0, 255, 0);
            font-size: 20px;
            font-weight: bold;
            font-family: 'Trebuchet MS', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 180px;
        }

        #search-container {
            position: relative;
            flex-grow: 1;
            max-width: 420px;
            margin-left: 10px;
            min-width: 180px;
        }

        #search-input {
            width: 100%;
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid rgb(0, 255, 0);
            border-radius: 24px;
            color: rgb(0, 255, 0);
            padding: 10px 18px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0, 255, 0, 0.1);
        }

        #search-input:focus {
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        #search-results {
            position: absolute;
            top: 52px;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid rgb(0, 255, 0);
            border-radius: 12px;
            max-height: 260px;
            overflow-y: auto;
            display: none;
            z-index: 2100;
        }

        .search-item {
            padding: 12px 18px;
            color: white;
            cursor: pointer;
            border-bottom: 1px solid rgba(0, 255, 0, 0.12);
            transition: background 0.2s;
        }

        .search-item:hover {
            background: rgba(0, 255, 0, 0.18);
            color: rgb(0, 255, 0);
        }

        #patec-text {
            display: none;
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 92%;
            color: rgba(0, 255, 0, 0.95);
            text-align: center;
            font-size: 18px;
            line-height: 1.4;
            letter-spacing: 0.6px;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(0, 255, 0, 0.18);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.08);
            z-index: 1900;
        }

        #kraje-odwiedzone {
            display: none;
            position: absolute;
            top: 170px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 0, 0.9);
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(0, 255, 0, 0.18);
            border-radius: 18px;
            z-index: 1900;
        }
        #kontener-na-globus {
            position: absolute;
            inset: 0;
        }
        #info-panel {
            position: absolute;
            top: 70px; /* Wysokość górnego panelu */
            right: 0;  /* Przyklejamy do prawej krawędzi */
            width: 400px;
            height: calc(100vh - 70px); /* Cała wysokość minus górny pasek */
            background: rgba(0, 0, 0, 0.9);
            border-left: 2px solid rgb(0, 255, 0); /* Tylko lewa krawędź świeci */
            border-top: none;
            border-bottom: none;
            border-right: none;
            color: rgba(0, 255, 0, 1);
            padding: 30px;
            display: none; /* Zmieniane przez JS na 'block' */
            z-index: 1900; /* Tuż pod panelem górnym (który ma 2000) */
            overflow-y: auto;
            box-shadow: -10px 0 20px rgba(0, 255, 0, 0.1);
            box-sizing: border-box;
            transition: transform 0.3s ease; /* Płynne wysuwanie jeśli używasz transform */
        }
        #info-panel.visible {
            display: block;
        }
        #info-panel h2 {
            margin: 0 0 12px;
            font-size: 24px;
        }
        #info-panel img {
            width: 100%;
            display: block;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        #info-panel a {
            color: rgb(0, 255, 0);
            text-decoration: none;
        }
        #close-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: 1px solid rgb(0, 255, 0);
            color: rgb(0, 255, 0);
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        #social-kontener {
    position: fixed;
    bottom: 25px;
    right: 25px;
    display: flex;
    flex-direction: column; 
    gap: 15px;
    z-index: 5;
}

.wiersz-instagram {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 15px;
}

.instagram-tekst {
    color: rgba(0, 255, 0);
    font-weight: bold;
    font-size: 16px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.8);
}

.przycisk-instagram {
    width: 50px;
    height: 50px;
    background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transition: transform 0.3s ease;
    text-decoration: none;
}

.przycisk-instagram:hover {
    transform: scale(1.15);
}

.przycisk-instagram svg {
    width: 26px;
    height: 26px;
    fill: white;
}
    /* Optymalizacja mobilna */
@media (max-width: 768px) {
    #top-panel {
        justify-content: center;
        padding: 14px 16px;
    }

    #patec-status {
        width: 100%;
        text-align: center;
        font-size: 18px;
        order: 1;
    }

    #search-container {
        width: 100%;
        max-width: 100%;
        margin-left: 0;
        order: 2;
    }

    #search-input {
        width: 100%;
        font-size: 15px;
        padding: 12px 18px;
    }

    #search-results {
        width: 100%;
        position: relative;
        top: 10px;
    }

    #patec-text {
        display: block;
        top: 125px;
        font-size: 16px;
        padding: 12px 16px;
    }

    #kraje-odwiedzone {
        display: block;
        top: 200px;
        font-size: 13px;
        width: 92%;
        padding: 10px 14px;
    }

    #info-panel {
        width: 100%;
        right: 0;
        top: auto;
        bottom: 0;
        border-radius: 20px 20px 0 0;
        max-height: 55%;
        padding: 20px;
    }

    #social-kontener {
        bottom: 15px;
        right: 15px;
        gap: 10px;
    }

    .instagram-tekst {
        display: none;
    }

    .przycisk-instagram {
        width: 40px;
        height: 40px;
    }
}

        function showCountryPanel(krajName, countryData) {
            const data = panelData[krajName] || {
                title: krajName,
                html: '<p>Tutaj go jeszcze nie było :(</p>'
            };

            infoTitle.textContent = data.title;
            infoContent.innerHTML = data.html;
            infoPanel.classList.add('visible');

            mojGlobus.controls().autoRotate = false;

            if (countryData && countryData.geometry) {
                const coordinates = countryData.geometry.coordinates;
                let allCoords = [];
                
                if (countryData.geometry.type === 'Polygon') {
                    allCoords = coordinates[0];
                } else if (countryData.geometry.type === 'MultiPolygon') {
                    coordinates.forEach(polygon => {
                        allCoords = allCoords.concat(polygon[0]);
                    });
                }
                
                if (allCoords.length > 0) {
                    let lat = 0, lon = 0;
                    allCoords.forEach(coord => {
                        lon += coord[0];
                        lat += coord[1];
                    });
                    lat /= allCoords.length;
                    lon /= allCoords.length;
                    
                    mojGlobus.pointOfView({ lat: lat, lng: lon, altitude: 2 }, 1000);
                }
            }
        }

        const mojGlobus = Globe()
            (document.getElementById('kontener-na-globus'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
            .showAtmosphere(true)
            .atmosphereColor('lightskyblue')
            .atmosphereAltitude(0.15)
            .pointOfView({ altitude: 2 });

        let wszystkieKraje = [];
        fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson')
            .then(res => res.json())
            .then(kraje => {
                wszystkieKraje = kraje.features; // Zapisujemy dane do wyszukiwania
                mojGlobus
                    .polygonsData(kraje.features)
                    
                    .polygonCapColor(kraj => {
                        const nazwa = kraj.properties.ADMIN;
                        if (odwiedzoneKraje.includes(nazwa)) {
                            return 'rgba(0, 255, 0, 0.6)';
                        }
                        return 'rgba(255, 255, 255, 0.3)';
                    })
                    
                    .polygonStrokeColor(() => 'rgba(255, 255, 255, 0.5)')
                    .polygonAltitude(kraj => {
                        return odwiedzoneKraje.includes(kraj.properties.ADMIN) ? 0.03 : 0.01;
                    })
                    
                    .onPolygonClick((kraj) => {
                        showCountryPanel(kraj.properties.ADMIN, kraj);
                        if (window.innerWidth <= 768) {
                        infoPanel.scrollTop = 0;
                        }
                    })
                    
                    .onPolygonHover(krajPodMyszka => {
                        najechanyKraj = krajPodMyszka;
                        mojGlobus
                            .polygonAltitude(kraj => {
                                if (kraj === najechanyKraj) return 0.08;
                                if (odwiedzoneKraje.includes(kraj.properties.ADMIN)) return 0.03;
                                return 0.01;
                            })
                            .polygonCapColor(kraj => {
                                if (kraj === najechanyKraj) return 'gold';
                                if (odwiedzoneKraje.includes(kraj.properties.ADMIN)) return 'rgba(0, 255, 0, 0.6)';
                                return 'rgba(255, 255, 255, 0.3)';
                            });
                    });
            });

        mojGlobus.controls().autoRotate = true;
        mojGlobus.controls().autoRotateSpeed = 0.5;
    const input = document.getElementById('search-input');
        const results = document.getElementById('search-results');

        input.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            results.innerHTML = '';
            
            if (query.length < 2) {
                results.style.display = 'none';
                return;
            }

            // Filtrujemy kraje sprawdzając polską i angielską nazwę
            const matches = wszystkieKraje.filter(k => {
                const angielskaNazwa = k.properties.ADMIN;
                const polskaNazwa = polskieNazwy[angielskaNazwa] || angielskaNazwa; // Jeśli nie ma w słowniku, użyj angielskiej
                return polskaNazwa.toLowerCase().includes(query) || angielskaNazwa.toLowerCase().includes(query);
            }).slice(0, 6);

            if (matches.length > 0) {
                results.style.display = 'block';
                matches.forEach(kraj => {
                    const angielskaNazwa = kraj.properties.ADMIN;
                    const polskaNazwa = polskieNazwy[angielskaNazwa] || angielskaNazwa;

                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerText = polskaNazwa;
                    div.onclick = () => focusOnCountry(kraj, polskaNazwa);
                    results.appendChild(div);
                });
            } else {
                results.style.display = 'none';
            }
        });

        function focusOnCountry(kraj, wyswietlanaNazwa) {
            results.style.display = 'none';
            input.value = wyswietlanaNazwa;

            // Pobieranie współrzędnych do przeskoku kamery
            const coords = kraj.geometry.coordinates[0][0];
            const [lng, lat] = Array.isArray(coords[0]) ? coords[0] : coords;

            mojGlobus.pointOfView({ lat: lat, lng: lng, altitude: 1.8 }, 1500);
            
            // Otwarcie Twojego panelu informacyjnego
            // Używamy oryginalnej angielskiej nazwy jako klucza do panelData
            showCountryPanel(kraj.properties.ADMIN, kraj);
        }

    
    </script>
